name: Nightly Build

on:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  NightlyBuild:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install nvim
        run: make nvim-bin

      - name: Build
        run: PREFIX=dist NVIM=nvim-linux-x86_64/bin/nvim make install

      - name: Create Tarball
        run: tar -czf nvpp.tar.gz dist/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          name: Nvim++ Nightly
          prerelease: true
          tag_name: nightly
          files: nvpp.tar.gz
